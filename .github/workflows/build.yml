name: Build Quickshell deb

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:trixie
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config git ca-certificates \
            qt6-base-dev qt6-declarative-dev qt6-shadertools-dev \
            qt6-wayland-dev qt6-svg-dev spirv-tools \
            libcli11-dev libjemalloc-dev wayland-protocols \
            libwayland-dev libdrm-dev libqtqmlmodels-dev libpam0g-dev \
            qt6-base-private-dev qt6-declarative-private-dev \
            qt6-wayland-private-dev dpkg-dev \
            libgbm-dev libvulkan-dev libxcb1-dev libpipewire-0.3-dev \
            libpolkit-agent-1-dev libglib2.0-dev \
            libegl-dev libgles-dev libegl1-mesa-dev libgl1-mesa-dev \
            meson qml6-module-qtquick qml6-module-qtquick-controls

          git clone --depth 1 --branch 1.45 https://gitlab.freedesktop.org/wayland/wayland-protocols.git wp-src
          cd wp-src
          meson setup builddir --prefix=/usr
          meson install -C builddir
          cd ..

      - name: Clone Quickshell source
        run: git clone --depth 1 --branch v0.3.0 https://github.com/quickshell-mirror/quickshell src

      - name: Configure and Build
        run: |
          cd src
          cmake -GNinja -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCRASH_HANDLER=OFF \
            -DNO_PCH=ON \
            -DDISTRIBUTOR="nucoOS"
          cmake --build build

      - name: Install into package root
        run: |
          cd src
          DESTDIR="${GITHUB_WORKSPACE}/pkgroot" cmake --install build
          mkdir -p "${GITHUB_WORKSPACE}/pkgroot/DEBIAN"

      - name: Process Control and Dependencies
        run: |
          # 1. Control dosyasını kopyala
          cp "${GITHUB_WORKSPACE}/debian/control" "${GITHUB_WORKSPACE}/pkgroot/DEBIAN/control"
          
          # 2. Otomatik bağımlılık analizi
          # Bu komut binary'yi inceler ve debian/substvars dosyasını oluşturur
          dpkg-shlibdeps -pquickshell "${GITHUB_WORKSPACE}/pkgroot/usr/bin/quickshell"
          
          # 3. Bağımlılıkları enjekte et
          # ${shlibs:Depends} değişkenini control dosyasına ekler (eğer yoksa)
          if ! grep -q "\${shlibs:Depends}" "${GITHUB_WORKSPACE}/pkgroot/DEBIAN/control"; then
            sed -i '/^Depends:/ s/$/, ${shlibs:Depends}/' "${GITHUB_WORKSPACE}/pkgroot/DEBIAN/control"
          fi
          
          # 4. Final control dosyasını oluştur
          # Bu komut ${shlibs:Depends} değişkenini gerçek kütüphane listesiyle değiştirir
          dpkg-gencontrol -pquickshell -P"${GITHUB_WORKSPACE}/pkgroot" -O > "${GITHUB_WORKSPACE}/pkgroot/DEBIAN/control"

      - name: Build .deb
        run: |
          dpkg-deb --build --root-owner-group pkgroot quickshell_0.3.0_amd64.deb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quickshell-deb
          path: "*.deb"

      - name: Publish to Releases
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.3.0
          files: "*.deb"